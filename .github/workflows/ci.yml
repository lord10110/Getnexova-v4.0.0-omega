name: GetNexova CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -c "
          import ast, pathlib, sys
          errors = 0
          for f in pathlib.Path('.').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  print(f'SYNTAX ERROR: {f}: {e}')
                  errors += 1
          sys.exit(errors)
          "

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Type check (optional)
        continue-on-error: true
        run: |
          mypy --ignore-missing-imports core/ agents/ 2>/dev/null || true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build main container
        run: docker build -t getnexova:test .

      - name: Build advanced tools container
        run: docker build -t getnexova-advanced:test -f integrations/Dockerfile.advanced .
